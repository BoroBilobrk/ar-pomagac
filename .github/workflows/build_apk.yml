name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Kompajliranje Flutter Aplikacije
    runs-on: ubuntu-latest

    steps:
      - name: Checkout koda
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Izgradnja aplikacije (Bulletproof metoda)
        run: |
          # 1. Stvaranje svježeg projekta s ispravnim imenom (neovisno o imenu repozitorija)
          flutter create --org hr.broker --project-name bro_ker_ar --platforms android flutter_app
          
          # 2. Prebacivanje tvog dizajna i koda u taj novi projekt
          cp -r lib/ flutter_app/
          cp pubspec.yaml flutter_app/
          
          # 3. Pokretanje kompilacije unutar čiste mape
          cd flutter_app
          flutter pub get
          flutter build apk --release
          
          # 4. Izvlačenje gotove aplikacije van za preuzimanje
          cp build/app/outputs/flutter-apk/app-release.apk ../

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BRO-KER-AR-App
          path: app-release.apk
          
