name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Kompajliranje Flutter Aplikacije
    runs-on: ubuntu-latest

    steps:
      - name: Checkout koda
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      # OVO JE KLJUČNI NOVI KORAK: Generiranje Android mape
      - name: Generiraj nedostajuce Flutter mape
        run: |
          flutter create --platforms android .
          git checkout lib/main.dart pubspec.yaml

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BRO-KER-AR-App
          path: build/app/outputs/flutter-apk/app-release.apk
          
