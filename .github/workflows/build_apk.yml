name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Kompajliranje Flutter Aplikacije
    runs-on: ubuntu-latest

    steps:
      - name: Checkout koda
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      # NOVO: Brisanje problematičnog Android 35 paketa sa servera
      - name: Popravak za Android 35 SDK bug na GitHubu
        run: sudo rm -rf /usr/local/lib/android/sdk/platforms/android-35

      - name: Izgradnja aplikacije s dozvolama za kameru
        run: |
          # 1. Stvaranje svježeg projekta
          flutter create --org hr.broker --project-name bro_ker_ar --platforms android flutter_app
          
          # 2. INJEKCIJA: Prisilno dizanje minimalne verzije Androida na 21 zbog kamere
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 21/g' flutter_app/android/app/build.gradle
          
          # 3. Prebacivanje koda
          cp -r lib/ flutter_app/
          cp pubspec.yaml flutter_app/
          
          # 4. Kompilacija
          cd flutter_app
          flutter pub get
          flutter build apk --release
          
          # 5. Izvlačenje APK-a
          cp build/app/outputs/flutter-apk/app-release.apk ../

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BRO-KER-AR-App
          path: app-release.apk
          
