name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Kompajliranje Flutter Aplikacije
    runs-on: ubuntu-latest

    steps:
      - name: Checkout koda
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Izgradnja - Konačna fuzija pravila
        run: |
          flutter create --org hr.broker --project-name bro_ker_ar --platforms android flutter_app
          
          # 1. PRECIZNI KOTLIN POPRAVAK
          sed -i -E 's/(id "org\.jetbrains\.kotlin\.android" version )"[^"]+"/\1"1.9.24"/g' flutter_app/android/settings.gradle
          echo 'buildscript { ext.kotlin_version = "1.9.24" }' > flutter_app/android/build.gradle.tmp
          cat flutter_app/android/build.gradle >> flutter_app/android/build.gradle.tmp
          mv flutter_app/android/build.gradle.tmp flutter_app/android/build.gradle
          
          # 2. INJEKCIJE ZA GLAVNU APLIKACIJU
          sed -i -E 's/minSdk(Version)?\s*=?\s*flutter\.minSdkVersion/minSdk = 24/g' flutter_app/android/app/build.gradle
          sed -i -E 's/compileSdk(Version)?\s*=?\s*flutter\.compileSdkVersion/compileSdk = 34/g' flutter_app/android/app/build.gradle
          sed -i -E 's/targetSdk(Version)?\s*=?\s*flutter\.targetSdkVersion/targetSdk = 34/g' flutter_app/android/app/build.gradle
          
          # 3. ARCORE MANIFEST (DODAN INTERNET)
          cat << 'EOF' > flutter_app/android/app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
                    xmlns:tools="http://schemas.android.com/tools">
              <uses-permission android:name="android.permission.CAMERA" />
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-feature android:name="android.hardware.camera.ar" android:required="true" />
              <application
                  android:label="bro_ker_ar"
                  android:name="${applicationName}"
                  android:icon="@mipmap/ic_launcher"
                  android:usesCleartextTraffic="true">
                  <meta-data android:name="com.google.ar.core" android:value="required" tools:replace="android:value" />
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      <meta-data android:name="io.flutter.embedding.android.NormalTheme" android:resource="@style/NormalTheme" />
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <meta-data android:name="flutterEmbedding" android:value="2" />
              </application>
          </manifest>
          EOF
          
          # 4. Prebacivanje koda
          cp -r lib/ flutter_app/
          cp pubspec.yaml flutter_app/
          
          # 5. Nabavljanje paketa
          cd flutter_app
          flutter pub get
          
          # 6. POPRAVAK CACHEA
          find /home/runner/.pub-cache/hosted/pub.dev/ -name "build.gradle" -type f -exec sed -i -E 's/flutter\.compileSdkVersion/34/g' {} +
          find /home/runner/.pub-cache/hosted/pub.dev/ -name "build.gradle" -type f -exec sed -i -E 's/flutter\.minSdkVersion/24/g' {} +
          find /home/runner/.pub-cache/hosted/pub.dev/ -name "build.gradle" -type f -exec sed -i -E 's/flutter\.targetSdkVersion/34/g' {} +
          
          # 7. Kompilacija
          flutter build apk --release
          
          # 8. Izvlačenje
          cp build/app/outputs/flutter-apk/app-release.apk ../

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BRO-KER-AR-App
          path: app-release.apk
          
