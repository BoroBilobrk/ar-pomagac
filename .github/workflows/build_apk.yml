name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Kompajliranje Flutter Aplikacije
    runs-on: ubuntu-latest

    steps:
      - name: Checkout koda
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Izgradnja - Konačna fuzija pravila
        run: |
          # Stvaranje projekta
          flutter create --org hr.broker --project-name bro_ker_ar --platforms android flutter_app
          
          # 1. KOTLIN POPRAVAK (Glavna postavka + Sigurnosna mreža za stare pakete)
          sed -i -E 's/(id\s*["'\'']org\.jetbrains\.kotlin\.android["'\'']\s*version\s*["'\''])[^"'\'']+(["'\''])/\11.9.24\2/g' flutter_app/android/settings.gradle
          sed -i '1i buildscript { ext.kotlin_version = "1.9.24" }' flutter_app/android/build.gradle
          
          # 2. INJEKCIJE ZA GLAVNU APLIKACIJU
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 24/g' flutter_app/android/app/build.gradle
          sed -i 's/compileSdkVersion flutter.compileSdkVersion/compileSdkVersion 34/g' flutter_app/android/app/build.gradle
          
          # 3. ARCORE DOZVOLE (Koristimo AWK alat da ubacimo dozvole samo JEDNOM i spriječimo duplikate!)
          awk '/<application/ && !app_done { print "    <uses-permission android:name=\"android.permission.CAMERA\" />"; print "    <uses-feature android:name=\"android.hardware.camera.ar\" android:required=\"true\" />"; app_done=1 } 1' flutter_app/android/app/src/main/AndroidManifest.xml > temp.xml && mv temp.xml flutter_app/android/app/src/main/AndroidManifest.xml
          awk '/<activity/ && !act_done { print "        <meta-data android:name=\"com.google.ar.core\" android:value=\"required\" />"; act_done=1 } 1' flutter_app/android/app/src/main/AndroidManifest.xml > temp.xml && mv temp.xml flutter_app/android/app/src/main/AndroidManifest.xml
          
          # 4. Prebacivanje tvog koda
          cp -r lib/ flutter_app/
          cp pubspec.yaml flutter_app/
          
          # 5. Nabavljanje paketa
          cd flutter_app
          flutter pub get
          
          # 6. KIRURŠKI POPRAVAK CACHEA (Za stare pakete)
          find /home/runner/.pub-cache/hosted/pub.dev/ -name "build.gradle" -type f -exec sed -i 's/flutter\.compileSdkVersion/34/g' {} +
          find /home/runner/.pub-cache/hosted/pub.dev/ -name "build.gradle" -type f -exec sed -i 's/flutter\.minSdkVersion/24/g' {} +
          find /home/runner/.pub-cache/hosted/pub.dev/ -name "build.gradle" -type f -exec sed -i 's/flutter\.targetSdkVersion/34/g' {} +
          
          # 7. Kompilacija
          flutter build apk --release
          
          # 8. Izvlačenje APK-a
          cp build/app/outputs/flutter-apk/app-release.apk ../

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BRO-KER-AR-App
          path: app-release.apk
          
