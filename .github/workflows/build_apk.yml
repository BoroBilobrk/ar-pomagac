name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Kompajliranje Flutter Aplikacije
    runs-on: ubuntu-latest

    steps:
      - name: Checkout koda
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Izgradnja aplikacije i postavljanje strogih pravila
        run: |
          # 1. Stvaranje svježeg projekta
          flutter create --org hr.broker --project-name bro_ker_ar --platforms android flutter_app
          
          # 2. INJEKCIJE ZA GLAVNU APLIKACIJU
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 21/g' flutter_app/android/app/build.gradle
          sed -i 's/compileSdkVersion flutter.compileSdkVersion/compileSdkVersion 34/g' flutter_app/android/app/build.gradle
          sed -i 's/targetSdkVersion flutter.targetSdkVersion/targetSdkVersion 34/g' flutter_app/android/app/build.gradle
          
          # 3. PRAVILO NA SAMOM POČETKU (Rješava "already evaluated" grešku)
          echo "subprojects { afterEvaluate { project -> if (project.hasProperty('android')) { project.android { compileSdkVersion 34 } } } }" > temp.gradle
          cat flutter_app/android/build.gradle >> temp.gradle
          mv temp.gradle flutter_app/android/build.gradle
          
          # 4. Prebacivanje tvog koda
          cp -r lib/ flutter_app/
          cp pubspec.yaml flutter_app/
          
          # 5. Kompilacija
          cd flutter_app
          flutter pub get
          flutter build apk --release
          
          # 6. Izvlačenje APK-a
          cp build/app/outputs/flutter-apk/app-release.apk ../

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BRO-KER-AR-App
          path: app-release.apk
          
